server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gestaoclick-mcp

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

erp:
  base-url: ${ERP_BASE_URL:}
  access-token: ${ERP_ACCESS_TOKEN:}
  secret-access-token: ${ERP_SECRET_ACCESS_TOKEN:}
  timeout-ms: ${ERP_TIMEOUT_MS:5000}
